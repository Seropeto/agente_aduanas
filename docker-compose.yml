services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agentia_db
      POSTGRES_USER:     agentia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentia_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentia_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentia -d agentia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5435:5432"


  agentia:
    build: .
    restart: unless-stopped

    environment:
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      ENVIRONMENT: "production"
      SERVICE_NAME: "agentia-aduanas"
      # Parámetros discretos de PostgreSQL (robustos ante '@' u otros caracteres
      # especiales en la contraseña; evita la URL mal formada por interpolación).
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB:   "agentia_db"
      POSTGRES_USER: "agentia"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentia_dev_pass}
      # SENTRY_DSN e SENTRY_TRACES_RATE se inyectan desde Coolify/Dokploy secrets
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentia_net   # red privada interna para Postgres (DNS por nombre fijo)
      - host_bridge   # red base del sistema Docker para el enlace del proxy
    volumes:
      - uploads_data:/app/data/uploads
      - logs_data:/app/data/logs
    expose:
      - "8000"
    # Enrutamiento explícito de Traefik (proxy de Coolify) hacia el puerto 8000.
    # Sin estas labels el proxy no sabe a qué puerto enviar el tráfico externo → 504.
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.agentia.rule=Host(`aduanas.toxirodigital.cloud`)"
      - "traefik.http.services.agentia.loadbalancer.server.port=8000"
    healthcheck:
      # La imagen python:3.11-slim NO trae curl; usamos Python (siempre presente).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  uploads_data:
  logs_data:
  postgres_data:

# Red compartida con nombre FIJO: garantiza que postgres y agentia queden en la
# misma red en cada redeploy de Coolify (evita que el agentia nuevo arranque en
# una red distinta a postgres y no lo resuelva por DNS).
networks:
  agentia_net:
    name: agentia_net
    driver: bridge
  # Red base del sistema Docker (la 'bridge' por defecto), declarada externa para
  # no acoplar AgentIA a redes de otros proyectos. Mapeo seguro al puente del host.
  host_bridge:
    external: true
    name: bridge
