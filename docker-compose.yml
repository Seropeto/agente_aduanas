services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agentia_db
      POSTGRES_USER:     agentia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentia_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      agentia_net:
        # Alias ÚNICO para la BD. Evita la colisión de DNS: en la red compartida
        # 'coolify' existe otro servicio llamado 'postgres' (de otro proyecto) y el
        # app resolvía a ESE. 'agentia_db_host' no colisiona con nadie.
        aliases:
          - agentia_db_host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentia -d agentia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5435:5432"


  agentia:
    build: .
    restart: unless-stopped

    environment:
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      ENVIRONMENT: "production"
      SERVICE_NAME: "agentia-aduanas"
      # Parámetros discretos de PostgreSQL. POSTGRES_HOST usa el alias ÚNICO
      # 'agentia_db_host' (NO 'postgres', que colisiona con otro proyecto en la red
      # compartida 'coolify' y hacía que el app conectara a la BD equivocada).
      POSTGRES_HOST: "agentia_db_host"
      POSTGRES_PORT: "5432"
      POSTGRES_DB:   "agentia_db"
      POSTGRES_USER: "agentia"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentia_dev_pass}
      # SENTRY_DSN e SENTRY_TRACES_RATE se inyectan desde Coolify/Dokploy secrets
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentia_net          # red privada interna (API ↔ Postgres por DNS de nombre fijo)
      - coolify_proxy_real   # red compartida REAL del proxy en este stack (Traefik)
    volumes:
      - uploads_data:/app/data/uploads
      - logs_data:/app/data/logs
    expose:
      - "8000"
    # El enrutamiento (router, TLS y labels) lo gestiona Coolify nativamente desde el
    # panel. NO declaramos labels manuales: competían con las dinámicas y causaban 504.
    healthcheck:
      # La imagen python:3.11-slim NO trae curl; usamos Python (siempre presente).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  uploads_data:
  logs_data:
  postgres_data:

# Red compartida con nombre FIJO: garantiza que postgres y agentia queden en la
# misma red en cada redeploy de Coolify (evita que el agentia nuevo arranque en
# una red distinta a postgres y no lo resuelva por DNS).
networks:
  agentia_net:
    name: agentia_net
    driver: bridge
  # Red troncal física del proxy de Coolify en el VPS (entidad real en el motor Docker;
  # 'j85i9ndz73g' era solo un alias lógico del panel → network not found). Externa: ya
  # existe. El enrutamiento HTTP/TLS lo generan las labels dinámicas del panel.
  coolify_proxy_real:
    external: true
    name: coolify
