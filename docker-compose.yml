services:
  agentia:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      ENVIRONMENT: "production"
      SERVICE_NAME: "agentia-aduanas"
      # SENTRY_DSN e SENTRY_TRACES_RATE se inyectan desde Coolify/Dokploy secrets
    volumes:
      - chroma_data:/app/data/chroma_db
      - uploads_data:/app/data/uploads
      - logs_data:/app/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
  uploads_data:
  logs_data:
