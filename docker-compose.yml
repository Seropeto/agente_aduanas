services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agentia_db
      POSTGRES_USER:     agentia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentia_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentia -d agentia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5435:5432"

  agentia:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      ENVIRONMENT: "production"
      SERVICE_NAME: "agentia-aduanas"
      POSTGRES_URL: "postgresql://agentia:${POSTGRES_PASSWORD:-agentia_dev_pass}@postgres:5432/agentia_db"
      # SENTRY_DSN e SENTRY_TRACES_RATE se inyectan desde Coolify/Dokploy secrets
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma_db
      - uploads_data:/app/data/uploads
      - logs_data:/app/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
  uploads_data:
  logs_data:
  postgres_data:
